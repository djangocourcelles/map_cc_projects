<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map CC Projects</title>
  <style>
    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --border:       #30363d;
      --text-primary: #e6edf3;
      --text-muted:   #8b949e;
      --text-code:    #a5d6ff;
      --accent-gsd:   #3fb950;
      --shadow:       rgba(0, 0, 0, 0.55);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:           #f6f8fa;
        --surface:      #ffffff;
        --border:       #d0d7de;
        --text-primary: #1f2328;
        --text-muted:   #656d76;
        --text-code:    #0969da;
        --accent-gsd:   #1a7f37;
        --shadow:       rgba(0, 0, 0, 0.12);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: system-ui, -apple-system, sans-serif;
    }
    #canvas { width: 100vw; height: 100vh; display: block; }

    .zoom-surface { cursor: grab; }
    .zoom-surface:active { cursor: grabbing; }
    .node { cursor: grab; }
    .node.dragging { cursor: grabbing; }

    .node:hover .bubble { filter: brightness(1.15); }
    .node.dragging .bubble {
      transform: scale(1.05);
      transform-origin: center;
      transform-box: fill-box;
    }

    .bubble {
      transform-box: fill-box;
      transform-origin: center;
    }

    #empty-state {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      z-index: 100;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      max-width: 240px;
      pointer-events: none;
      box-shadow: 0 4px 20px var(--shadow);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 160ms ease, transform 160ms ease;
    }
    #tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .tt-name   { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; line-height: 1.2; }
    .tt-stack  { font-size: 14px; margin-bottom: 4px; }
    .tt-row    { display: flex; align-items: center; gap: 6px; color: var(--text-muted); margin-top: 3px; font-size: 12px; line-height: 1.4; }
    .tt-dot    { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tt-sep    { color: var(--text-muted); }
    .tt-branch { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace; font-size: 11px; color: var(--text-code); }
    .tt-commit { color: var(--text-muted); font-size: 12px; }
    .tt-gsd    { display: flex; align-items: center; gap: 4px; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); font-size: 11px; font-weight: 500; }
    .tt-gsd-dot   { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tt-gsd-label { color: var(--text-primary); }

    /* Search overlay */
    #search-overlay {
      position: fixed; top: 16px; left: 16px; z-index: 200;
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 12px;
      box-shadow: 0 2px 8px var(--shadow);
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    #search-overlay:focus-within {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15), 0 2px 8px var(--shadow);
    }
    .search-icon {
      font-size: 15px; color: var(--text-muted); line-height: 1; user-select: none;
    }
    #search-input {
      background: transparent; border: none; outline: none;
      color: var(--text-primary);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px; width: 160px; caret-color: #58a6ff;
    }
    #search-input::placeholder { color: var(--text-muted); }
    #search-input::-webkit-search-cancel-button { display: none; }

    /* Legend */
    #legend {
      position: fixed; bottom: 16px; left: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      font-size: 11px; color: var(--text-muted);
      display: flex; flex-direction: column; gap: 5px;
      pointer-events: none;
    }
    .leg-title  { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
    .leg-item   { display: flex; align-items: center; gap: 8px; }
    .leg-dot    { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .leg-dash   { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
                  border: 1.5px dashed #6e7681; background: transparent; }
    .leg-sep    { border-top: 1px solid var(--border); margin: 3px 0; }
    .leg-circle { border-radius: 50%; background: #3fb950; display: inline-block; flex-shrink: 0; }
    .leg-ring {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid; background: transparent;
    }
    .leg-ring-dash {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
      background: transparent;
      border: 2px dashed #444d56;
    }

    /* WebSocket status dot */
    #dot-ws {
      position: fixed;
      bottom: 12px;
      right: 12px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #6e7681;
      transition: background 0.3s ease;
      z-index: 200;
    }
  </style>
</head>
<body>
  <div id="canvas"></div>
  <div id="empty-state">No projects found in workspace.</div>
  <div id="tooltip"></div>
  <div id="search-overlay">
    <span class="search-icon" aria-hidden="true">⌕</span>
    <input id="search-input" type="search" placeholder="Filter projects…"
           autocomplete="off" spellcheck="false" />
  </div>

  <div id="legend">
    <div class="leg-title">Size &mdash; activity</div>
    <div class="leg-item"><span class="leg-circle" style="width:18px;height:18px;opacity:0.7"></span> Today (50px)</div>
    <div class="leg-item"><span class="leg-circle" style="width:14px;height:14px;opacity:0.7"></span> &lt; 7 days (40px)</div>
    <div class="leg-item"><span class="leg-circle" style="width:11px;height:11px;opacity:0.6"></span> &lt; 30 days (30px)</div>
    <div class="leg-item"><span class="leg-circle" style="width:7px;height:7px;opacity:0.5;background:#6e7681"></span> &lt; 90 days (20px)</div>
    <div class="leg-item"><span class="leg-circle" style="width:4px;height:4px;opacity:0.4;background:#6e7681"></span> Inactive (12px)</div>
    <div class="leg-sep"></div>
    <div class="leg-title">Ring &mdash; GSD status</div>
    <div class="leg-item"><span class="leg-ring" style="border-color:#58a6ff"></span> In progress</div>
    <div class="leg-item"><span class="leg-ring" style="border-color:#3fb950"></span> Complete</div>
    <div class="leg-item"><span class="leg-ring" style="border-color:#6e7681"></span> Not started</div>
    <div class="leg-item"><span class="leg-ring" style="border-color:#d29922"></span> Paused</div>
    <div class="leg-item"><span class="leg-ring" style="border-color:#f85149"></span> Blocked</div>
    <div class="leg-item"><span class="leg-ring-dash"></span> No STATE.md</div>
  </div>

  <div id="dot-ws" title="WebSocket"></div>

  <script src="/lib/d3.min.js"></script>
  <script>
    const WIDTH  = window.innerWidth;
    const HEIGHT = window.innerHeight;
    const LS_KEY = 'map_cc_positions';
    const CX = WIDTH / 2, CY = HEIGHT / 2;
    const BASE = Math.min(WIDTH, HEIGHT);

    // Target radii for the 3 force zones
    const ZONE_ACTIVE   = 0;
    const ZONE_RECENT   = BASE * 0.22;
    const ZONE_INACTIVE = BASE * 0.40;

    /* ===== SVG ===== */
    const svg = d3.select('#canvas')
      .append('svg')
      .attr('width', WIDTH)
      .attr('height', HEIGHT);

    // Zoom target: background rect (not the nodes)
    const zoomSurface = svg.append('rect')
      .attr('class', 'zoom-surface')
      .attr('width', WIDTH)
      .attr('height', HEIGHT)
      .attr('fill', 'transparent')
      .style('pointer-events', 'all');

    const viewport = svg.append('g').attr('class', 'viewport');

    /* ===== Zoom ===== */
    const zoom = d3.zoom()
      .scaleExtent([0.2, 4])
      .on('zoom', e => viewport.attr('transform', e.transform));
    svg.call(zoom);

    /* ===== Utilities ===== */
    function nodeColor(d) {
      if (!d.has_git) return '#444d56';
      const days = d.days_since_commit;
      if (days === null || days > 30) return '#6e7681';
      if (days <= 7) return '#3fb950';
      return '#d29922';
    }

    function targetZone(d) {
      if (!d.has_git) return ZONE_INACTIVE;
      const days = d.days_since_commit;
      if (days === null || days > 30) return ZONE_INACTIVE;
      if (days <= 7) return ZONE_ACTIVE;
      return ZONE_RECENT;
    }

    function daysLabel(d) {
      if (!d.has_git) return 'no git';
      const days = d.days_since_commit;
      if (days === null) return '?';
      if (days === 0) return 'today';
      return days + 'd';
    }

    function stackLabel(d) {
      if (!d.stacks || d.stacks.length === 0) return '';
      return d.stacks.filter(s => s.emoji).map(s => s.emoji).join(' ');
    }

    /* ===== GSD colors ===== */
    const GSD_COLORS = {
      'in-progress': '#58a6ff',
      'complete':    '#3fb950',
      'not-started': '#6e7681',
      'paused':      '#d29922',
      'blocked':     '#f85149',
      'unknown':     '#6e7681',
    };
    const COLOR_NO_STATE = '#444d56';

    function gsdColor(d) {
      if (!d.has_state) return COLOR_NO_STATE;
      return GSD_COLORS[d.gsd_status] || GSD_COLORS['unknown'];
    }

    /* ===== WebSocket status dot ===== */
    function setWsDot(state) {
      const el = document.getElementById('dot-ws');
      if (!el) return;
      const colors = { green: '#3fb950', orange: '#d29922', red: '#f85149' };
      el.style.background = colors[state] || '#6e7681';
    }

    /* ===== Tooltip ===== */
    const tooltip = document.getElementById('tooltip');

    /** Escapes HTML characters to prevent XSS. */
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const GSD_LABELS = {
      'in-progress': 'In progress',
      'complete':    'Complete',
      'not-started': 'Not started',
      'paused':      'Paused',
      'blocked':     'Blocked',
      'unknown':     'GSD active',
    };

    function showTooltip(event, d) {
      const c        = nodeColor(d);
      const stacks   = stackLabel(d);
      const branch   = d.has_git && d.branch ? d.branch : null;
      const gColor   = gsdColor(d);
      const gLabel   = d.has_state ? (GSD_LABELS[d.gsd_status] || 'GSD active') : null;
      tooltip.innerHTML = [
        `<div class="tt-name">${esc(d.name)}</div>`,
        stacks ? `<div class="tt-stack">${stacks}</div>` : '',
        `<div class="tt-row">`,
          `<div class="tt-dot" style="background:${c}"></div>`,
          `<span class="tt-date">${esc(d.date_label)}</span>`,
          branch ? `<span class="tt-sep">·</span><code class="tt-branch">${esc(branch)}</code>` : '',
        `</div>`,
        d.last_commit ? `<div class="tt-row tt-commit">${esc(d.last_commit)}</div>` : '',
        gLabel ? `<div class="tt-gsd"><span class="tt-gsd-dot" style="background:${gColor}"></span><span class="tt-gsd-label">${esc(gLabel)}</span></div>` : '',
      ].join('');
      tooltip.classList.add('visible');
      moveTooltip(event);
    }

    const OFFSET_X = 12, OFFSET_Y = 20;
    function moveTooltip(event) {
      const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
      let x = event.clientX + OFFSET_X;
      let y = event.clientY - OFFSET_Y - th;
      if (x + tw > window.innerWidth - 8) x = event.clientX - tw - OFFSET_X;
      if (y < 8)                          y = event.clientY + 8;
      tooltip.style.left = x + 'px';
      tooltip.style.top  = y + 'px';
    }

    function hideTooltip() { tooltip.classList.remove('visible'); }

    function pulseNode(nodeEl) {
      d3.select(nodeEl).select('.bubble')
        .transition().duration(120).attr('transform', 'scale(1.15)')
        .transition().duration(180).attr('transform', 'scale(1)');
    }

    function savePositions(nodes) {
      const pos = {};
      nodes.forEach(n => { pos[n.id] = { x: n.x, y: n.y }; });
      try {
        localStorage.setItem(LS_KEY, JSON.stringify(pos));
      } catch (e) {
        console.warn('[positions] Could not save:', e.message);
      }
    }

    /* ===== Zone rings (drawn on the viewport background) ===== */
    function drawRings() {
      const zones = [
        { r: BASE * 0.13, label: 'Active ≤ 7d',       c: '#3fb950' },
        { r: BASE * 0.30, label: 'Recent ≤ 30d',       c: '#d29922' },
        { r: BASE * 0.48, label: 'Inactive / no git',  c: '#6e7681' },
      ];
      const g = viewport.append('g').attr('class', 'rings');
      zones.forEach(z => {
        g.append('circle')
          .attr('cx', CX).attr('cy', CY)
          .attr('r', z.r)
          .attr('fill', 'none')
          .attr('stroke', z.c)
          .attr('stroke-width', 1)
          .attr('stroke-dasharray', '4 7')
          .attr('opacity', 0.18);
        g.append('text')
          .attr('x', CX + 6)
          .attr('y', CY - z.r + 14)
          .attr('fill', z.c)
          .attr('font-size', '11px')
          .attr('opacity', 0.45)
          .text(z.label);
      });
    }

    /* ===== Node factory (shared by enter and updateVisuals) ===== */
    function createNode(enter) {
      const g = enter.append('g').attr('class', 'node');

      // Halo for active projects (≤7d with git)
      g.append('circle')
        .attr('class', 'halo')
        .attr('r', d => (d.has_git && d.days_since_commit !== null && d.days_since_commit <= 7)
          ? d.radius + 10 : 0)
        .attr('fill', '#3fb95010')
        .attr('stroke', 'none');

      // Main bubble
      g.append('circle')
        .attr('class', 'bubble')
        .attr('r', d => d.radius)
        .attr('fill', d => nodeColor(d) + '1a')
        .attr('stroke', d => nodeColor(d))
        .attr('stroke-width', d => {
          if (!d.has_git) return 1.5;
          if (d.days_since_commit !== null && d.days_since_commit <= 7) return 2.5;
          return 2;
        })
        .attr('stroke-dasharray', d => d.has_git ? null : '5 4')
        .attr('opacity', d => d.opacity !== undefined ? d.opacity : 1);

      // GSD ring (drawn after .bubble for correct z-order)
      g.append('circle')
        .attr('class', 'gsd-ring')
        .attr('r', d => d.radius + 3)
        .attr('fill', 'none')
        .attr('stroke-width', 3)
        .attr('stroke', d => gsdColor(d))
        .attr('stroke-dasharray', d => d.has_state ? null : '5 4');

      // Stack emojis
      g.append('text')
        .attr('class', 'stack-emoji')
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('y', d => stackLabel(d) ? -6 : 0)
        .attr('font-size', d => Math.max(11, d.radius * 0.45) + 'px')
        .text(d => stackLabel(d));

      // Project name
      g.append('text')
        .attr('class', 'project-name')
        .attr('text-anchor', 'middle')
        .attr('y', d => d.radius + 13)
        .attr('font-size', '10px')
        .attr('font-weight', '500')
        .attr('fill', d => nodeColor(d))
        .text(d => d.name.length > 14 ? d.name.slice(0, 13) + '…' : d.name);

      // Days label
      g.append('text')
        .attr('class', 'days-label')
        .attr('text-anchor', 'middle')
        .attr('y', d => d.radius + 25)
        .attr('font-size', '9px')
        .attr('fill', d => nodeColor(d))
        .attr('opacity', 0.7)
        .text(d => daysLabel(d));

      return g;
    }

    /* ===== Simulation ===== */
    let simulation;

    function startSimulation(nodes) {
      drawRings();

      simulation = d3.forceSimulation(nodes)
        .force('radial',    d3.forceRadial(d => targetZone(d), CX, CY).strength(0.55))
        .force('collision', d3.forceCollide(d => d.radius + 6).strength(0.9))
        .force('center',    d3.forceCenter(CX, CY).strength(0.04))
        .alphaDecay(0.05)
        .on('tick', tick)
        .on('end', () => {
          simulation.alphaTarget(0).stop();
          savePositions(nodes);
        });

      const nodeEls = viewport.selectAll('g.node')
        .data(nodes, d => d.id)
        .join(
          enter => createNode(enter),
          update => update,
          exit => exit.remove()
        );

      nodeEls
        .on('mouseenter', (event, d) => showTooltip(event, d))
        .on('mousemove',  (event)    => moveTooltip(event))
        .on('mouseleave', ()         => hideTooltip());

      nodeEls.on('mousedown', e => { e.stopPropagation(); hideTooltip(); })
        .call(d3.drag()
          .on('start', (event, d) => {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
            const el = event.sourceEvent?.target?.closest?.('.node');
            if (el) d3.select(el).classed('dragging', true);
          })
          .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
          .on('end', (event, d) => {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
            const el = event.sourceEvent?.target?.closest?.('.node');
            if (el) d3.select(el).classed('dragging', false);
            savePositions(nodes);
          })
        );

      nodeEls.on('click', (event, d) => {
        pulseNode(event.currentTarget);
        fetch('/open?path=' + encodeURIComponent(d.path)).catch(() => {});
      });

      function tick() {
        nodeEls.attr('transform', d => `translate(${d.x},${d.y})`);
      }
    }

    /* ===== Live update — refresh visuals without restarting the simulation ===== */
    function updateVisuals(newData) {
      // Merge saved positions BEFORE any D3 operation to avoid overwriting them
      const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      newData.forEach(p => {
        const pos = saved[p.id];
        if (pos && typeof pos.x === 'number' && typeof pos.y === 'number'
            && isFinite(pos.x) && isFinite(pos.y)) {
          p.x = pos.x;
          p.y = pos.y;
        }
      });

      const nodeEls = viewport.selectAll('g.node')
        .data(newData, d => d.id)
        .join(
          enter => {
            const g = createNode(enter);
            g.on('mouseenter', (event, d) => showTooltip(event, d))
              .on('mousemove',  (event)    => moveTooltip(event))
              .on('mouseleave', ()         => hideTooltip());
            g.on('mousedown', e => { e.stopPropagation(); hideTooltip(); })
              .call(d3.drag()
                .on('start', (event, d) => {
                  if (!event.active) simulation.alphaTarget(0.3).restart();
                  d.fx = d.x; d.fy = d.y;
                  const el = event.sourceEvent?.target?.closest?.('.node');
                  if (el) d3.select(el).classed('dragging', true);
                })
                .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                .on('end', (event, d) => {
                  if (!event.active) simulation.alphaTarget(0);
                  d.fx = null; d.fy = null;
                  const el = event.sourceEvent?.target?.closest?.('.node');
                  if (el) d3.select(el).classed('dragging', false);
                  savePositions(newData);
                })
              );
            g.on('click', (event, d) => {
              pulseNode(event.currentTarget);
              fetch('/open?path=' + encodeURIComponent(d.path)).catch(() => {});
            });
            return g;
          },
          update => update,
          exit => exit.remove()
        );

      nodeEls.select('.bubble')
        .transition().duration(400)
        .attr('r', d => d.radius)
        .attr('opacity', d => d.opacity !== undefined ? d.opacity : 1);

      nodeEls.select('.gsd-ring')
        .transition().duration(400)
        .attr('r', d => d.radius + 3)
        .attr('stroke', d => gsdColor(d))
        .attr('stroke-dasharray', d => d.has_state ? null : '5 4');

      // Nudge collision force after radius changes
      if (simulation) {
        simulation.force('collision', d3.forceCollide(d => d.radius + 6).strength(0.9))
          .alpha(0.1).restart();
      }

      savePositions(newData);
    }

    /* ===== Initial load + localStorage merge ===== */
    fetch('/api/projects')
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(projects => {
        if (projects.length === 0) {
          document.getElementById('empty-state').style.display = 'block';
          return;
        }

        // Merge saved positions BEFORE startSimulation()
        const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
        const n = projects.length;
        projects.forEach((p, i) => {
          const pos = saved[p.id];
          if (pos && typeof pos.x === 'number' && typeof pos.y === 'number'
              && isFinite(pos.x) && isFinite(pos.y)) {
            p.x = pos.x;
            p.y = pos.y;
          } else {
            const angle = (2 * Math.PI * i) / n;
            p.x = CX + 180 * Math.cos(angle);
            p.y = CY + 180 * Math.sin(angle);
          }
        });

        startSimulation(projects);
      })
      .catch(err => {
        console.error('Could not load projects:', err.message);
        const el = document.getElementById('empty-state');
        el.textContent = 'Load error — is the server running?';
        el.style.display = 'block';
      });

    /* ===== WebSocket client ===== */
    let reconnectDelay = 1000;
    const MAX_RECONNECT = 30000;
    let wsInstance = null;

    function connectWS() {
      if (wsInstance && wsInstance.readyState === WebSocket.CONNECTING) return;

      const ws = new WebSocket(`ws://localhost:${location.port || 3000}`);
      wsInstance = ws;

      ws.addEventListener('open', () => {
        reconnectDelay = 1000;
        setWsDot('green');
      });

      ws.addEventListener('message', (evt) => {
        try {
          const msg = JSON.parse(evt.data);
          if (msg.type === 'update' && Array.isArray(msg.projects)) {
            updateVisuals(msg.projects);
          }
        } catch (e) {
          console.error('[ws] Invalid message:', e.message);
        }
      });

      ws.addEventListener('close', () => {
        if (wsInstance !== ws) return;
        wsInstance = null;
        if (reconnectDelay >= MAX_RECONNECT) {
          setWsDot('red');
          return;
        }
        setWsDot('orange');
        const delay = reconnectDelay;
        reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT);
        setTimeout(connectWS, delay);
      });

      ws.addEventListener('error', () => ws.close());
    }

    /* ===== Filter (search bar) ===== */
    (function() {
      const input = document.getElementById('search-input');
      if (!input) return;

      function normalize(s) {
        return String(s || '').toLowerCase().normalize('NFD').replace(/\p{Diacritic}/gu, '');
      }

      function applyFilter() {
        const term = normalize(input.value);
        viewport.selectAll('g.node')
          .transition().duration(200)
          .attr('opacity', d => (!term || normalize(d.name).includes(term)) ? 1 : 0.15);
      }

      input.addEventListener('input', applyFilter);
      input.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          input.value = '';
          applyFilter();
          input.blur();
        }
      });
    })();

    connectWS();
  </script>
</body>
</html>
