<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map CC Projects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0d1117;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #carte { width: 100vw; height: 100vh; display: block; }

    .zoom-surface { cursor: grab; }
    .zoom-surface:active { cursor: grabbing; }
    .noeud { cursor: grab; }
    .noeud.dragging { cursor: grabbing; }

    .noeud:hover .bulle { filter: brightness(1.15); }
    .noeud.dragging .bulle {
      transform: scale(1.05);
      transform-origin: center;
      transform-box: fill-box;
    }

    #etat-vide {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #8b949e;
      font-size: 14px;
      text-align: center;
    }

    /* Tooltip */
    #tooltip {
      display: none;
      position: fixed;
      z-index: 100;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 12px;
      color: #e6edf3;
      pointer-events: none;
      max-width: 220px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    #tooltip.visible { display: block; }
    .tt-nom   { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .tt-row   { display: flex; align-items: center; gap: 6px; color: #8b949e; margin-top: 3px; }
    .tt-dot   { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tt-gsd   { margin-top: 6px; padding-top: 6px; border-top: 1px solid #30363d;
                font-size: 10px; color: #3fb950; }

    /* Légende */
    #legende {
      position: fixed; bottom: 16px; left: 16px;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 10px 14px;
      font-size: 11px; color: #8b949e;
      display: flex; flex-direction: column; gap: 5px;
      pointer-events: none;
    }
    .leg-titre { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
    .leg-item  { display: flex; align-items: center; gap: 8px; }
    .leg-dot   { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .leg-dash  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
                 border: 1.5px dashed #6e7681; background: transparent; }
    .leg-sep   { border-top: 1px solid #30363d; margin: 3px 0; }
    .leg-cercle { border-radius: 50%; background: #3fb950; display: inline-block; flex-shrink: 0; }
    .leg-anneau {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid; background: transparent;
    }
    .leg-anneau-dash {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
      background: transparent;
      border: 2px dashed #444d56;
    }

    /* Dot WebSocket (D-12) */
    #dot-ws {
      position: fixed;
      bottom: 12px;
      right: 12px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #6e7681;
      transition: background 0.3s ease;
      z-index: 200;
    }
  </style>
</head>
<body>
  <div id="carte"></div>
  <div id="etat-vide">Aucun projet trouvé dans le workspace.</div>
  <div id="tooltip"></div>

  <div id="legende">
    <div class="leg-titre">Taille &mdash; activité</div>
    <div class="leg-item"><span class="leg-cercle" style="width:18px;height:18px;opacity:0.7"></span> Aujourd'hui (50px)</div>
    <div class="leg-item"><span class="leg-cercle" style="width:14px;height:14px;opacity:0.7"></span> &lt; 7 jours (40px)</div>
    <div class="leg-item"><span class="leg-cercle" style="width:11px;height:11px;opacity:0.6"></span> &lt; 30 jours (30px)</div>
    <div class="leg-item"><span class="leg-cercle" style="width:7px;height:7px;opacity:0.5;background:#6e7681"></span> &lt; 90 jours (20px)</div>
    <div class="leg-item"><span class="leg-cercle" style="width:4px;height:4px;opacity:0.4;background:#6e7681"></span> Inactif (12px)</div>
    <div class="leg-sep"></div>
    <div class="leg-titre">Anneau &mdash; statut GSD</div>
    <div class="leg-item"><span class="leg-anneau" style="border-color:#58a6ff"></span> En cours</div>
    <div class="leg-item"><span class="leg-anneau" style="border-color:#3fb950"></span> Terminé</div>
    <div class="leg-item"><span class="leg-anneau" style="border-color:#6e7681"></span> Non démarré</div>
    <div class="leg-item"><span class="leg-anneau" style="border-color:#d29922"></span> En pause</div>
    <div class="leg-item"><span class="leg-anneau" style="border-color:#f85149"></span> Bloqué</div>
    <div class="leg-item"><span class="leg-anneau-dash"></span> Sans STATE.md</div>
  </div>

  <div id="dot-ws" title="WebSocket"></div>

  <script src="/lib/d3.min.js"></script>
  <script>
    const LARGEUR = window.innerWidth;
    const HAUTEUR = window.innerHeight;
    const CLE_LS  = 'map_cc_positions';
    const CX = LARGEUR / 2, CY = HAUTEUR / 2;
    const BASE = Math.min(LARGEUR, HAUTEUR);

    // Rayons cibles des 3 zones (forceRadial)
    const RAYON_ACTIF    = 0;
    const RAYON_RECENT   = BASE * 0.22;
    const RAYON_INACTIF  = BASE * 0.40;

    /* ===== SVG ===== */
    const svg = d3.select('#carte')
      .append('svg')
      .attr('width', LARGEUR)
      .attr('height', HAUTEUR);

    // Surface de zoom (pitfall #2 : zoom sur rect de fond)
    const zoomSurface = svg.append('rect')
      .attr('class', 'zoom-surface')
      .attr('width', LARGEUR)
      .attr('height', HAUTEUR)
      .attr('fill', 'transparent')
      .style('pointer-events', 'all');

    const viewport = svg.append('g').attr('class', 'viewport');

    /* ===== Zoom (VIS-02) ===== */
    const zoom = d3.zoom()
      .scaleExtent([0.2, 4])
      .on('zoom', e => viewport.attr('transform', e.transform));
    svg.call(zoom);

    /* ===== Utilitaires ===== */
    function couleur(d) {
      if (!d.has_git) return '#444d56';
      const j = d.jours_depuis_commit;
      if (j === null || j > 30) return '#6e7681';
      if (j <= 7) return '#3fb950';
      return '#d29922';
    }

    function rayonCible(d) {
      if (!d.has_git) return RAYON_INACTIF;
      const j = d.jours_depuis_commit;
      if (j === null || j > 30) return RAYON_INACTIF;
      if (j <= 7) return RAYON_ACTIF;
      return RAYON_RECENT;
    }

    function labelJours(d) {
      if (!d.has_git) return 'sans git';
      const j = d.jours_depuis_commit;
      if (j === null) return '?';
      if (j === 0) return 'auj.';
      return j + 'j';
    }

    function labelStack(d) {
      if (!d.stacks || d.stacks.length === 0) return '';
      const avecEmoji = d.stacks.filter(s => s.emoji);
      return avecEmoji.map(s => s.emoji).join(' ');
    }

    /* ===== Couleurs GSD (D-04) ===== */
    const COULEURS_GSD = {
      'in-progress': '#58a6ff',
      'complete':    '#3fb950',
      'not-started': '#6e7681',
      'paused':      '#d29922',
      'blocked':     '#f85149',
      'unknown':     '#6e7681',
    };
    const COULEUR_SANS_STATE = '#444d56';

    function couleurGSD(d) {
      if (!d.has_state) return COULEUR_SANS_STATE;
      return COULEURS_GSD[d.phase_gsd] || COULEURS_GSD['unknown'];
    }

    /* ===== Dot WebSocket (D-12) ===== */
    function dotWS(etat) {
      const el = document.getElementById('dot-ws');
      if (!el) return;
      const couleurs = { vert: '#3fb950', orange: '#d29922', rouge: '#f85149' };
      el.style.background = couleurs[etat] || '#6e7681';
    }

    /* ===== Tooltip ===== */
    const tooltip = document.getElementById('tooltip');

    function afficherTooltip(event, d) {
      const c = couleur(d);
      const stacks = labelStack(d);
      const jours  = labelJours(d);
      const branche = d.has_git && d.branche ? d.branche : null;

      tooltip.innerHTML = `
        <div class="tt-nom">${d.nom}</div>
        ${stacks ? `<div class="tt-row"><span style="font-size:14px">${stacks}</span></div>` : ''}
        <div class="tt-row">
          <div class="tt-dot" style="background:${c}"></div>
          <span>${jours}</span>
          ${branche ? `<span style="color:#6e7681">·</span><span style="font-family:monospace;font-size:11px">${branche}</span>` : ''}
        </div>
        ${d.date_relative && d.has_git ? `<div class="tt-row" style="margin-left:13px">${d.date_relative}</div>` : ''}
        ${d.has_gsd ? '<div class="tt-gsd">✦ GSD actif</div>' : ''}
      `;
      tooltip.classList.add('visible');
      deplacerTooltip(event);
    }

    function deplacerTooltip(event) {
      const marge = 14;
      const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
      let x = event.clientX + marge;
      let y = event.clientY + marge;
      if (x + tw > LARGEUR - 8) x = event.clientX - tw - marge;
      if (y + th > HAUTEUR - 8) y = event.clientY - th - marge;
      tooltip.style.left = x + 'px';
      tooltip.style.top  = y + 'px';
    }

    function masquerTooltip() { tooltip.classList.remove('visible'); }

    function sauvegarderPositions(nodes) {
      const pos = {};
      nodes.forEach(n => { pos[n.id] = { x: n.x, y: n.y }; });
      localStorage.setItem(CLE_LS, JSON.stringify(pos));
    }

    /* ===== Anneaux guides (fond, dans le viewport) ===== */
    function dessinerAnneaux() {
      const zones = [
        { r: BASE * 0.13, label: 'Actifs ≤ 7j',       c: '#3fb950' },
        { r: BASE * 0.30, label: 'Récents ≤ 30j',      c: '#d29922' },
        { r: BASE * 0.48, label: 'Inactifs / sans git', c: '#6e7681' },
      ];
      const g = viewport.append('g').attr('class', 'anneaux');
      zones.forEach(z => {
        g.append('circle')
          .attr('cx', CX).attr('cy', CY)
          .attr('r', z.r)
          .attr('fill', 'none')
          .attr('stroke', z.c)
          .attr('stroke-width', 1)
          .attr('stroke-dasharray', '4 7')
          .attr('opacity', 0.18);
        g.append('text')
          .attr('x', CX + 6)
          .attr('y', CY - z.r + 14)
          .attr('fill', z.c)
          .attr('font-size', '11px')
          .attr('opacity', 0.45)
          .text(z.label);
      });
    }

    /* ===== Fonction de création d'un nœud (partagée enter/mettreAJourVisuels) ===== */
    function creerNoeud(enter) {
      const g = enter.append('g').attr('class', 'noeud');

      // Halo pour les actifs (≤7j avec git)
      g.append('circle')
        .attr('class', 'halo')
        .attr('r', d => (d.has_git && d.jours_depuis_commit !== null && d.jours_depuis_commit <= 7)
          ? d.rayon + 10 : 0)
        .attr('fill', '#3fb95010')
        .attr('stroke', 'none');

      // Cercle principal
      g.append('circle')
        .attr('class', 'bulle')
        .attr('r', d => d.rayon)
        .attr('fill', d => couleur(d) + '1a')
        .attr('stroke', d => couleur(d))
        .attr('stroke-width', d => {
          if (!d.has_git) return 1.5;
          if (d.jours_depuis_commit !== null && d.jours_depuis_commit <= 7) return 2.5;
          return 2;
        })
        .attr('stroke-dasharray', d => d.has_git ? null : '5 4')
        .attr('opacity', d => d.opacite !== undefined ? d.opacite : 1);

      // Anneau GSD (VIS-05) — rendu après .bulle (z-order SVG)
      g.append('circle')
        .attr('class', 'anneau-gsd')
        .attr('r', d => d.rayon + 3)
        .attr('fill', 'none')
        .attr('stroke-width', 3)
        .attr('stroke', d => couleurGSD(d))
        .attr('stroke-dasharray', d => d.has_state ? null : '5 4');

      // Emojis stack
      g.append('text')
        .attr('class', 'emoji-stack')
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'middle')
        .attr('y', d => labelStack(d) ? -6 : 0)
        .attr('font-size', d => Math.max(11, d.rayon * 0.45) + 'px')
        .text(d => labelStack(d));

      // Nom du projet
      g.append('text')
        .attr('class', 'nom-projet')
        .attr('text-anchor', 'middle')
        .attr('y', d => d.rayon + 13)
        .attr('font-size', '10px')
        .attr('font-weight', '500')
        .attr('fill', d => couleur(d))
        .text(d => d.nom.length > 14 ? d.nom.slice(0, 13) + '…' : d.nom);

      // Jours depuis commit
      g.append('text')
        .attr('class', 'label-jours')
        .attr('text-anchor', 'middle')
        .attr('y', d => d.rayon + 25)
        .attr('font-size', '9px')
        .attr('fill', d => couleur(d))
        .attr('opacity', 0.7)
        .text(d => labelJours(d));

      return g;
    }

    /* ===== Simulation ===== */
    let simulation;

    function lancerSimulation(nodes) {
      dessinerAnneaux();

      simulation = d3.forceSimulation(nodes)
        .force('radial',    d3.forceRadial(d => rayonCible(d), CX, CY).strength(0.55))
        .force('collision', d3.forceCollide(d => d.rayon + 6).strength(0.9))
        .force('center',    d3.forceCenter(CX, CY).strength(0.04))
        .alphaDecay(0.05)
        .on('tick', mettreAJour)
        .on('end', () => {
          simulation.alphaTarget(0).stop();
          sauvegarderPositions(nodes);
        });

      /* Rendu avec key function (pitfall #5) */
      const noeuds = viewport.selectAll('g.noeud')
        .data(nodes, d => d.id)
        .join(
          enter => creerNoeud(enter),
          update => update,
          exit => exit.remove()
        );

      /* Tooltip hover */
      noeuds
        .on('mouseenter', (event, d) => afficherTooltip(event, d))
        .on('mousemove',  (event)    => deplacerTooltip(event))
        .on('mouseleave', ()         => masquerTooltip());

      /* Drag (pitfall #2 : stopPropagation sur mousedown) */
      noeuds.on('mousedown', e => { e.stopPropagation(); masquerTooltip(); })
        .call(d3.drag()
          .on('start', (event, d) => {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
            const el = event.sourceEvent?.target?.closest?.('.noeud');
            if (el) d3.select(el).classed('dragging', true);
          })
          .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
          .on('end', (event, d) => {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
            const el = event.sourceEvent?.target?.closest?.('.noeud');
            if (el) d3.select(el).classed('dragging', false);
            sauvegarderPositions(nodes);
          })
        );

      function mettreAJour() {
        noeuds.attr('transform', d => `translate(${d.x},${d.y})`);
      }
    }

    /* ===== Mise à jour visuels sans relancer simulation (D-10, Pitfall 3 + 4) ===== */
    function mettreAJourVisuels(nouvellesDonnees) {
      // Fusion positions sauvegardées AVANT toute opération D3 (Pitfall 3)
      const positionsSauvees = JSON.parse(localStorage.getItem(CLE_LS) || '{}');
      nouvellesDonnees.forEach(p => {
        if (positionsSauvees[p.id]) {
          // Mise à jour coordonnées uniquement — ne pas toucher fx/fy (drag en cours)
          p.x = positionsSauvees[p.id].x;
          p.y = positionsSauvees[p.id].y;
        }
      });

      // Mise à jour D3 avec key function — join sans recréer la simulation (Pitfall 4)
      const noeuds = viewport.selectAll('g.noeud')
        .data(nouvellesDonnees, d => d.id)
        .join(
          enter => {
            const g = creerNoeud(enter);
            // Attacher événements aux nouveaux nœuds
            g.on('mouseenter', (event, d) => afficherTooltip(event, d))
              .on('mousemove',  (event)    => deplacerTooltip(event))
              .on('mouseleave', ()         => masquerTooltip());
            g.on('mousedown', e => { e.stopPropagation(); masquerTooltip(); })
              .call(d3.drag()
                .on('start', (event, d) => {
                  if (!event.active) simulation.alphaTarget(0.3).restart();
                  d.fx = d.x; d.fy = d.y;
                  const el = event.sourceEvent?.target?.closest?.('.noeud');
                  if (el) d3.select(el).classed('dragging', true);
                })
                .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                .on('end', (event, d) => {
                  if (!event.active) simulation.alphaTarget(0);
                  d.fx = null; d.fy = null;
                  const el = event.sourceEvent?.target?.closest?.('.noeud');
                  if (el) d3.select(el).classed('dragging', false);
                  sauvegarderPositions(nouvellesDonnees);
                })
              );
            return g;
          },
          update => update,
          exit => exit.remove()
        );

      // Transitions 400ms sur les attributs visuels (D-10)
      noeuds.select('.bulle')
        .transition().duration(400)
        .attr('r', d => d.rayon)
        .attr('opacity', d => d.opacite !== undefined ? d.opacite : 1);

      noeuds.select('.anneau-gsd')
        .transition().duration(400)
        .attr('r', d => d.rayon + 3)
        .attr('stroke', d => couleurGSD(d))
        .attr('stroke-dasharray', d => d.has_state ? null : '5 4');

      // Réajustement physique après changement de rayons (Pitfall 6)
      if (simulation) {
        simulation.force('collision', d3.forceCollide(d => d.rayon + 6).strength(0.9))
          .alpha(0.1).restart();
      }

      sauvegarderPositions(nouvellesDonnees);
    }

    /* ===== Chargement + fusion localStorage (pitfall #3 : AVANT D3) ===== */
    fetch('/api/projects')
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(projets => {
        if (projets.length === 0) {
          document.getElementById('etat-vide').style.display = 'block';
          return;
        }

        // Fusion positions sauvegardées — AVANT lancerSimulation() (pitfall #3)
        const positionsSauvees = JSON.parse(localStorage.getItem(CLE_LS) || '{}');
        const n = projets.length;
        projets.forEach((p, i) => {
          if (positionsSauvees[p.id]) {
            p.x = positionsSauvees[p.id].x;
            p.y = positionsSauvees[p.id].y;
          } else {
            const angle = (2 * Math.PI * i) / n;
            p.x = CX + 180 * Math.cos(angle);
            p.y = CY + 180 * Math.sin(angle);
          }
        });

        lancerSimulation(projets);
      })
      .catch(err => {
        console.error('Impossible de charger les projets :', err.message);
        document.getElementById('etat-vide').textContent = 'Erreur de chargement — serveur démarré ?';
        document.getElementById('etat-vide').style.display = 'block';
      });

    /* ===== Client WebSocket (INT-04) ===== */
    let delaiReconnect = 1000;
    const DELAI_MAX_WS = 30000;
    let wsInstance = null;

    function connecterWS() {
      // Éviter les doublons si reconnexion rapide
      if (wsInstance && wsInstance.readyState === WebSocket.CONNECTING) return;

      const ws = new WebSocket(`ws://localhost:${location.port || 3000}`);
      wsInstance = ws;

      ws.addEventListener('open', () => {
        delaiReconnect = 1000;  // reset backoff
        dotWS('vert');
      });

      ws.addEventListener('message', (evt) => {
        try {
          const msg = JSON.parse(evt.data);
          if (msg.type === 'mise_a_jour' && Array.isArray(msg.projets)) {
            mettreAJourVisuels(msg.projets);
          }
        } catch (e) {
          console.error('[ws] Message invalide :', e.message);
        }
      });

      ws.addEventListener('close', () => {
        wsInstance = null;
        if (delaiReconnect > DELAI_MAX_WS) {
          dotWS('rouge');
          return;  // arrêt (D-11 : plafond 30s)
        }
        dotWS('orange');
        setTimeout(() => {
          delaiReconnect = Math.min(delaiReconnect * 2, DELAI_MAX_WS);
          connecterWS();
        }, delaiReconnect);
      });

      ws.addEventListener('error', () => ws.close());
    }

    // Démarrer la connexion WS après le chargement initial
    connecterWS();
  </script>
</body>
</html>
